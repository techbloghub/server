name: Go Build and Test

on:
  push:
    branches:
      - "cicd-test"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.5'

      - name: Create .env file from secret
        run: echo "${{ secrets.ENV }}" > .env

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./...
